---
layout: default
---

<section class="home-intro">
  <h1 class="sr-only">{{ site.title }}</h1>
  <p class="terminal-label">$ cat ./about</p>
  <p class="home-copy">{{ page.intro | default: site.description }}</p>
</section>

<section class="post-list-section">
  <h2 class="section-label">최근 글</h2>
  <div class="post-list">
    {% for post in site.posts %}
      {% include post-row.html post=post %}
    {% endfor %}
  </div>
</section>

<section class="topic-section">
  <h2 class="section-label">주로 쓰는 이야기</h2>
  <div class="tag-row">
    <a href="{{ '/tags/#dev' | relative_url }}">dev</a>
    <a href="{{ '/tags/#unreal' | relative_url }}">unreal</a>
    <a href="{{ '/tags/#cpp' | relative_url }}">cpp</a>
    <a href="{{ '/tags/#performance' | relative_url }}">performance</a>
    <a class="muted" href="{{ '/tags/#life' | relative_url }}">life</a>
  </div>
</section>

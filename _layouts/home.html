---
layout: default
---

<section class="home-intro">
  <h1 class="sr-only">{{ site.title }}</h1>
  <p class="terminal-label">$ cat ./about</p>
  <p class="home-copy">{{ page.intro | default: site.description }}</p>
</section>

<section class="post-list-section">
  <h2 class="section-label">최근 글</h2>
  <div class="post-list">
    {% for post in site.posts %}
      {% include post-row.html post=post %}
    {% endfor %}
  </div>
</section>

<!doctype html>
<html lang="{{ site.lang | default: 'ko-KR' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Sans+KR:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script>
      (function(){
        try {
          var saved = localStorage.getItem("hf-theme");
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.dataset.theme = saved || (prefersDark ? "dark" : "light");
        } catch (_) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
          <span>highfence</span><span class="logo-accent">_</span><span class="logo-cursor">█</span>
        </a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="{{ '/posts/' | relative_url }}" {% if page.url contains '/posts/' %}class="active"{% endif %}>글</a>
          <a href="{{ '/tags/' | relative_url }}" {% if page.url contains '/tags/' %}class="active"{% endif %}>태그</a>
          <a href="{{ '/about/' | relative_url }}" {% if page.url contains '/about/' %}class="active"{% endif %}>소개</a>
          <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
          <a href="https://github.com/highfence">GitHub</a>
        </nav>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="테마 전환">
          <span data-theme-icon>☼</span>
        </button>
      </div>
    </header>
    <main class="container main">
      {{ content }}
    </main>
    <footer class="site-footer">
      <div class="container">
        <div class="footer-inner">
          <div>Created with Jekyll © {{ site.time | date: "%Y" }}</div>
          <div class="footer-links">
            <a href="https://github.com/highfence">GitHub</a>
            <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
          </div>
        </div>
      </div>
    </footer>
    <script src="{{ '/assets/js/theme.js' | relative_url }}" defer></script>
  </body>
</html>
